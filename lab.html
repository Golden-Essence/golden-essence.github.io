<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Lab | Golden Essence Pvt Ltd</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header id="main-header"></header>

    <main>
        <div class="section-header">
            <h2>Inside Our Lab</h2>
            <p>Take a look at our state-of-the-art cultivation facilities.</p>
        </div>
        <div class="gallery">
            <div class="gallery-item">
                <img src="images/lab1.jpg" alt="Cordyceps growing in jars" onerror="this.src='https://via.placeholder.com/400x300?text=Lab+Photo+1'">
                <p>Sterile Cultivation Environment</p>
            </div>
            <div class="gallery-item">
                <img src="images/lab2.jpg" alt="Lab equipment" onerror="this.src='https://via.placeholder.com/400x300?text=Lab+Photo+2'">
                <p>Precision Temperature Control</p>
            </div>
            <div class="gallery-item">
                <img src="images/lab3.jpg" alt="Harvested Cordyceps" onerror="this.src='https://via.placeholder.com/400x300?text=Lab+Photo+3'">
                <p>Premium Harvest</p>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>
    <script src="script.js"></script>
</body>
</html>
